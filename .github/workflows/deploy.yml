name: Build and Deploy to Cloudflare

on:
  push:
    branches: [main]
  # Fired by the gitswitch release workflow after a new version is tagged, so
  # the site's version badge + docs always track the latest release.
  repository_dispatch:
    types: [gitswitch-release]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (syncs docs + version from git-switcher)
        env:
          # Lets the sync script read the Releases API without hitting the
          # unauthenticated rate limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
