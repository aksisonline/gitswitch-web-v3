name: Sync docs and trigger deploy

on:
  repository_dispatch:
    types: [gitswitch-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Sync docs from git-switcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run scripts/sync-content.ts

      - name: Commit synced content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/docs/
          git diff --staged --quiet && echo "No changes, skipping commit" || \
            git commit -m "chore: sync docs from gitswitch ${{ github.event.client_payload.version }}"
          git push
